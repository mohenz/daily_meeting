<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Meeting Memo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="page-shell">
        <aside class="sidebar">
            <div class="brand-block">
                <div class="brand-gradient"></div>
                <div class="brand-shell">
                    <div class="brand-mark">D</div>
                    <div>
                        <p class="eyebrow">Daily Meeting Workspace</p>
                        <h1>Daily Memo</h1>
                    </div>
                </div>
                <p class="brand-copy">날짜별, 작업자별로 데일리 미팅 내용을 기록하고 관리하는 간소화된 운영 앱입니다. 현재 단계는 앱 내부 사용자 관리 방식으로 운영합니다.</p>
                <div class="brand-command">daily scrum / wrap-up / emergency</div>
            </div>

            <section class="panel" id="sessionPanel"></section>

            <section class="panel">
                <div class="panel-header">
                    <h2>날짜 목록</h2>
                </div>
                <p class="panel-copy" id="datePanelCopy">기본 미팅 세션이 생성된 날짜를 기준으로 목록을 표시합니다.</p>
                <div id="dateList" class="date-list"></div>
            </section>
        </aside>

        <main class="workspace">
            <header class="workspace-header" id="workspaceHeader"></header>
            <div class="workspace-body" id="workspaceBody"></div>
        </main>
    </div>

    <div class="modal-backdrop hidden" id="modalBackdrop">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <p class="eyebrow" id="modalEyebrow">입력</p>
                    <h2 id="modalTitle">항목 등록</h2>
                </div>
                <button class="icon-button" type="button" data-action="close-modal" aria-label="닫기">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <p class="modal-copy" id="modalCopy"></p>
            <form id="modalForm" class="modal-form"></form>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
